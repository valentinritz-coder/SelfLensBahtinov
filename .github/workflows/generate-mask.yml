name: Generate Bahtinov mask

on:
  workflow_dispatch:
    inputs:
      profile:
        description: Lens profile
        required: true
        type: choice
        options:
          - fujifilm-xf100-400
          - fujifilm-xf16-80

      mask:
        description: Mask type
        required: true
        default: bahtinov
        type: choice
        options:
          - bahtinov
          - tribahtinov

      mount:
        description: Mount type (requires measured diameter in selected profile; bundled profiles are not ready until measured)
        required: true
        type: choice
        options:
          - lens-barrel-outer-slip-fit
          - hood-outer-slip-fit
          - hood-inner-slip-fit

      clearance:
        description: Fit clearance in millimetres
        required: true
        default: "0.35"
        type: string

      slot_width:
        description: Optional slot width in millimetres
        required: false
        default: ""
        type: string

      slot_spacing:
        description: Optional base pitch in millimetres
        required: false
        default: ""
        type: string

      slot_density:
        description: Slot density multiplier
        required: true
        default: "1.0"
        type: string

permissions:
  contents: read

jobs:
  test-and-generate:
    name: Test and generate
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip

      - name: Install Python project
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install pytest

      - name: Install OpenSCAD
        run: |
          sudo apt-get update
          sudo apt-get install --yes openscad xvfb
          openscad --version

      - name: Create headless OpenSCAD wrapper
        shell: bash
        run: |
          cat > "$RUNNER_TEMP/openscad-headless" <<'EOF'
          #!/usr/bin/env bash
          exec xvfb-run -a openscad "$@"
          EOF

          chmod +x "$RUNNER_TEMP/openscad-headless"

      - name: Compile Python sources
        run: python -m compileall -q src tests

      - name: Run tests
        run: pytest -q

      - name: Generate mask bundle
        shell: bash
        run: |
          args=(
            generate-bundle
            "${{ inputs.profile }}"
            --mask "${{ inputs.mask }}"
            --mount "${{ inputs.mount }}"
            --clearance "${{ inputs.clearance }}"
            --slot-density "${{ inputs.slot_density }}"
            --output-dir generated
            --openscad "$RUNNER_TEMP/openscad-headless"
            --show-grating-info
          )

          if [[ -n "${{ inputs.slot_width }}" ]]; then
            args+=(--slot-width "${{ inputs.slot_width }}")
          fi

          if [[ -n "${{ inputs.slot_spacing }}" ]]; then
            args+=(--slot-spacing "${{ inputs.slot_spacing }}")
          fi

          selflensbahtinov "${args[@]}"

      - name: List generated files
        run: |
          find generated -maxdepth 1 -type f -printf "%f\n" | sort

      - name: Upload generated models
        uses: actions/upload-artifact@v7
        with:
          name: bahtinov-${{ inputs.profile }}-${{ inputs.mask }}-${{ github.run_number }}
          path: generated/
          if-no-files-found: error
          retention-days: 30
