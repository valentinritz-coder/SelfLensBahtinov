name: Generate Bahtinov mask

on:
  workflow_dispatch:
    inputs:
      profile:
        description: Lens profile
        required: true
        type: choice
        options:
          - fujifilm-xf100-400
          - fujifilm-xf16-80

      mask:
        description: Mask type
        required: true
        default: bahtinov
        type: choice
        options:
          - bahtinov
          - tribahtinov

      mount:
        description: Smooth slip-fit mounting surface
        required: true
        type: choice
        options:
          - lens-barrel-outer-slip-fit
          - hood-outer-slip-fit
          - hood-inner-slip-fit

      mount_diameter:
        description: Measured diameter of the selected mounting surface, in millimetres
        required: true
        type: string

      measurement_status:
        description: Measurement provenance
        required: true
        default: measured
        type: choice
        options:
          - measured
          - verified

      clearance:
        description: Radial fit clearance in millimetres
        required: true
        default: "0.35"
        type: string

      ring_depth:
        description: Optional axial overlap depth of the mounting ring in millimetres; empty uses profile default
        required: false
        default: ""
        type: string

      lead_in_chamfer:
        description: Optional internal mounting-entry chamfer in millimetres; empty uses profile default, 0 disables it
        required: false
        default: ""
        type: string

      outer_edge_radius:
        description: Optional external edge treatment size in millimetres; empty uses profile default, 0 disables it
        required: false
        default: ""
        type: string

      outer_face_fillet_radius:
        description: Optional fillet radius on the outside edge of the slotted front face, in millimetres; empty uses profile default, 0 disables it
        required: false
        default: ""
        type: string

      region_gap:
        description: Solid separator-band width in millimetres for normal Bahtinov masks
        required: true
        default: "3.0"
        type: string

      slot_width:
        description: Optional slot width in millimetres
        required: false
        default: ""
        type: string

      slot_spacing:
        description: Optional base pitch in millimetres
        required: false
        default: ""
        type: string

      slot_density:
        description: Slot density multiplier
        required: true
        default: "1.0"
        type: string

      minimum_clipped_slot_length:
        description: Optional minimum useful clipped slot length in millimetres; empty uses automatic default, 0 disables filtering
        required: false
        default: ""
        type: string

permissions:
  contents: read

jobs:
  test-and-generate:
    name: Test and generate
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip

      - name: Install Python project
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install pytest

      - name: Install OpenSCAD
        run: |
          sudo apt-get update
          sudo apt-get install --yes openscad xvfb
          openscad --version

      - name: Create headless OpenSCAD wrapper
        shell: bash
        run: |
          cat > "$RUNNER_TEMP/openscad-headless" <<'EOF'
          #!/usr/bin/env bash
          exec xvfb-run -a openscad "$@"
          EOF

          chmod +x "$RUNNER_TEMP/openscad-headless"

      - name: Compile Python sources
        run: python -m compileall -q src tests

      - name: Run tests
        run: pytest -q

      - name: Create temporary measured profile
        id: measured-profile
        shell: bash
        env:
          PROFILE: ${{ inputs.profile }}
          MOUNT: ${{ inputs.mount }}
          MOUNT_DIAMETER: ${{ inputs.mount_diameter }}
          MEASUREMENT_STATUS: ${{ inputs.measurement_status }}
        run: |
          TEMP_PROFILE="$RUNNER_TEMP/${PROFILE}-measured.json"

          python - "$TEMP_PROFILE" <<'PY'
          import json
          import math
          import os
          import sys
          from pathlib import Path

          output_path = Path(sys.argv[1])
          profile_slug = os.environ["PROFILE"]
          mount = os.environ["MOUNT"]
          status = os.environ["MEASUREMENT_STATUS"]

          try:
              diameter = float(os.environ["MOUNT_DIAMETER"])
          except ValueError as exc:
              raise SystemExit(
                  "mount_diameter must be a valid number in millimetres"
              ) from exc

          if not math.isfinite(diameter) or diameter <= 0:
              raise SystemExit(
                  "mount_diameter must be a positive finite number"
              )

          if status not in {"measured", "verified"}:
              raise SystemExit(
                  "measurement_status must be measured or verified"
              )

          mount_fields = {
              "lens-barrel-outer-slip-fit": (
                  "lens_barrel_outer_mm",
                  "lens_barrel_outer_status",
              ),
              "hood-outer-slip-fit": (
                  "hood_outer_mm",
                  "hood_outer_status",
              ),
              "hood-inner-slip-fit": (
                  "hood_inner_mm",
                  "hood_inner_status",
              ),
          }

          try:
              diameter_field, status_field = mount_fields[mount]
          except KeyError as exc:
              raise SystemExit(
                  f"Unsupported mount type: {mount}"
              ) from exc

          source_path = Path("profiles") / f"{profile_slug}.json"

          if not source_path.is_file():
              raise SystemExit(f"Profile not found: {source_path}")

          data = json.loads(
              source_path.read_text(encoding="utf-8")
          )

          if data.get("schema_version") != 2:
              raise SystemExit(
                  "The temporary profile workflow requires schema_version 2"
              )

          data["mounting"][diameter_field] = diameter
          data["mounting"][status_field] = status

          # The workflow passes --mount explicitly. Keeping these values null
          # avoids persisting a temporary measurement as a recommendation.
          data["mounting"]["recommended_mount"] = None
          data["defaults"]["mount_type"] = None

          output_path.write_text(
              json.dumps(
                  data,
                  indent=2,
                  ensure_ascii=False,
              ) + "\n",
              encoding="utf-8",
          )

          print(
              f"Temporary profile created: {output_path}\n"
              f"Mount: {mount}\n"
              f"Diameter: {diameter:.3f} mm\n"
              f"Status: {status}"
          )
          PY

          echo "path=$TEMP_PROFILE" >> "$GITHUB_OUTPUT"

      - name: Validate temporary profile
        run: |
          selflensbahtinov validate \
            "${{ steps.measured-profile.outputs.path }}"

      - name: Show temporary profile
        run: |
          selflensbahtinov show \
            "${{ steps.measured-profile.outputs.path }}"

      - name: Generate mask bundle
        shell: bash
        run: |
          args=(
            generate-bundle
            "${{ steps.measured-profile.outputs.path }}"
            --mask "${{ inputs.mask }}"
            --mount "${{ inputs.mount }}"
            --clearance "${{ inputs.clearance }}"
            --region-gap "${{ inputs.region_gap }}"
            --slot-density "${{ inputs.slot_density }}"
            --output-dir generated
            --openscad "$RUNNER_TEMP/openscad-headless"
            --show-grating-info
          )

          if [[ -n "${{ inputs.ring_depth }}" ]]; then
            args+=(
              --ring-depth
              "${{ inputs.ring_depth }}"
            )
          fi

          if [[ -n "${{ inputs.lead_in_chamfer }}" ]]; then
            args+=(
              --lead-in-chamfer
              "${{ inputs.lead_in_chamfer }}"
            )
          fi

          if [[ -n "${{ inputs.outer_edge_radius }}" ]]; then
            args+=(
              --outer-edge-radius
              "${{ inputs.outer_edge_radius }}"
            )
          fi

          if [[ -n "${{ inputs.outer_face_fillet_radius }}" ]]; then
            args+=(
              --outer-face-fillet-radius
              "${{ inputs.outer_face_fillet_radius }}"
            )
          fi

          if [[ -n "${{ inputs.slot_width }}" ]]; then
            args+=(
              --slot-width
              "${{ inputs.slot_width }}"
            )
          fi

          if [[ -n "${{ inputs.slot_spacing }}" ]]; then
            args+=(
              --slot-spacing
              "${{ inputs.slot_spacing }}"
            )
          fi

          if [[ -n "${{ inputs.minimum_clipped_slot_length }}" ]]; then
            args+=(
              --minimum-clipped-slot-length
              "${{ inputs.minimum_clipped_slot_length }}"
            )
          fi

          printf 'Command arguments:\n'
          printf '  %q\n' selflensbahtinov "${args[@]}"

          selflensbahtinov "${args[@]}"

      - name: Save generation metadata
        shell: bash
        run: |
          cat > generated/generation-metadata.txt <<EOF
          Profile: ${{ inputs.profile }}
          Mask: ${{ inputs.mask }}
          Mount: ${{ inputs.mount }}
          Measured diameter: ${{ inputs.mount_diameter }} mm
          Measurement status: ${{ inputs.measurement_status }}
          Radial clearance: ${{ inputs.clearance }} mm
          Ring depth: ${{ inputs.ring_depth || 'profile default' }}
          Lead-in chamfer: ${{ inputs.lead_in_chamfer || 'profile default' }}
          Outer edge radius: ${{ inputs.outer_edge_radius || 'profile default' }}
          Outer front-face fillet radius: ${{ inputs.outer_face_fillet_radius || 'profile default' }}
          Region gap: ${{ inputs.region_gap }} mm
          Slot width: ${{ inputs.slot_width || 'automatic' }}
          Slot spacing: ${{ inputs.slot_spacing || 'automatic' }}
          Slot density: ${{ inputs.slot_density }}
          Minimum clipped slot length: ${{ inputs.minimum_clipped_slot_length || 'automatic' }}
          Commit: ${{ github.sha }}
          Workflow run: ${{ github.run_number }}
          EOF

      - name: Show generated SCAD mounting metadata
        shell: bash
        run: |
          echo "Mounting geometry recorded in generated SCAD files:"

          grep \
            --with-filename \
            --extended-regexp \
            "mount_diameter_mm=|ring_depth_mm=|lead_in_chamfer_mm=|outer_face_fillet_radius_mm=|mounting_entry_side=" \
            generated/*.scad || true

      - name: List generated files
        run: |
          find generated \
            -maxdepth 1 \
            -type f \
            -printf "%f\n" \
            | sort

      - name: Upload generated models
        uses: actions/upload-artifact@v7
        with:
          name: >-
            bahtinov-${{ inputs.profile }}-${{ inputs.mask }}-${{
            inputs.mount }}-${{ github.run_number }}
          path: generated/
          if-no-files-found: error
          retention-days: 30
